<svg width="272" height="64" viewBox="0 0 272 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hyperion Labs">
  <defs>
    <linearGradient id="pillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8f4"/>
      <stop offset="100%" stop-color="#b8b8cc"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="#00d4ff"/>
      <stop offset="70%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Antenna pips -->
  <rect x="2"  y="2" width="9" height="7" rx="1.5" fill="#00d4ff"/>
  <rect x="41" y="2" width="9" height="7" rx="1.5" fill="#00d4ff"/>

  <!-- Left pillar (chamfer top-left) -->
  <path d="M9,11 L15,11 L15,64 L0,64 L0,20 Z" fill="url(#pillar)"/>

  <!-- Right pillar (chamfer top-right) -->
  <path d="M37,11 L43,11 L52,20 L52,64 L37,64 Z" fill="url(#pillar)"/>

  <!-- Cyan crossbar -->
  <rect x="0" y="32" width="52" height="8" fill="url(#bar)"/>

  <!-- Panel notch details on crossbar -->
  <rect x="13" y="32" width="2" height="8" fill="rgba(10,10,15,0.35)"/>
  <rect x="37" y="32" width="2" height="8" fill="rgba(10,10,15,0.35)"/>

  <!-- Separator rule -->
  <rect x="63" y="9" width="1" height="46" fill="#1e1e3a"/>

  <!-- HYPERION wordmark -->
  <text
    x="76" y="36"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="800"
    font-size="21"
    fill="#f0f0ff"
    letter-spacing="3.5"
  >HYPERION</text>

  <!-- LABS wordmark -->
  <text
    x="78" y="55"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-weight="500"
    font-size="11.5"
    fill="#00d4ff"
    letter-spacing="9"
  >LABS</text>
</svg>
